
{% extends "base.html" %}

{% block title %}Edit Purchase{% endblock %}

{% block content %}
<div class="purchase-box">
    <h2>Edit Indent {{ purchase.indent_no }}</h2>

    <form method="POST" class="purchase-form">
        <div class="form-group">
            <label>Indent Location:</label>
            <input type="text" name="indent_location" value="{{ purchase.indent_location }}" required>
        </div>

        <div class="form-group">
            <label>Job Reference:</label>
            <input type="text" name="job_reference" value="{{ purchase.job_reference }}" required>
        </div>

        <div class="form-group">
            <label>Description:</label>
            <input type="text" name="description" value="{{ purchase.description }}" required>
        </div>

        <div class="form-group">
            <label>Prepared By:</label>
            <input type="text" name="prepared_by" value="{{ purchase.prepared_by }}" required>
        </div>

        <div class="form-group">
            <label>No of Items:</label>
            <input type="number" name="no_of_items" value="{{ purchase.no_of_items }}" required>
        </div>

        <button type="submit" class="btn">Update Record</button>
        <a href="{{ url_for('auth.purchase') }}" class="btn-small">Cancel</a>
    </form>
</div>
{% endblock %}
