<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Customer Walk-In Form</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f8f9fa;
        }
        .form-container {
            max-width: 900px;
            margin: 40px auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }
        .required::after {
            content: " *";
            color: red;
        }
    </style>
</head>

<body>

<div class="container">
    <div class="form-container">
        <h3 class="mb-4 text-center">🏢 Customer Walk-In Form</h3>

        <!-- Flash Messages -->
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert alert-{{ category }} alert-dismissible fade show">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            {% endfor %}
        {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('sales.sales_presales') }}">

            <div class="row mb-3">
                <div class="col-md-6">
                    <label class="form-label required">Customer Name</label>
                    <input type="text" name="custname" class="form-control" required>
                </div>

                <div class="col-md-6">
                    <label class="form-label required">Mobile Number</label>
                    <input type="tel" name="mobileno" class="form-control" maxlength="10" required>
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-md-6">
                    <label class="form-label">WhatsApp Number</label>
                    <input type="tel" name="whtsappno" class="form-control" maxlength="10">
                </div>

                <div class="col-md-6">
                    <label class="form-label">Email ID</label>
                    <input type="email" name="emailid" class="form-control">
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-md-6">
                    <label class="form-label">Location</label>
                    <input type="text" name="location" class="form-control">
                </div>

                <div class="col-md-6">
                    <label class="form-label">Pincode</label>
                    <input type="text" name="pincode" class="form-control" maxlength="6">
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-md-6">
                    <label class="form-label">Source</label>
                    <select name="source" class="form-select">
                        <option value="">-- Select Source --</option>
                        <option value="Walk-in">Walk-in</option>
                        <option value="Reference">Reference</option>
                        <option value="Website">Website</option>
                        <option value="Advertisement">Advertisement</option>
                    </select>
                </div>

                <div class="col-md-3">
                    <label class="form-label">Budget</label>
                    <input type="text" name="budget" class="form-control">
                </div>

                <div class="col-md-3">
                    <label class="form-label">BHK</label>
                    <select name="bhk" class="form-select">
                        <option value="">-- Select --</option>
                        <option value="1 BHK">1 BHK</option>
                        <option value="2 BHK">2 BHK</option>
                        <option value="3 BHK">3 BHK</option>
                        <option value="4+ BHK">4+ BHK</option>
                    </select>
                </div>
            </div>

            <div class="text-center mt-4">
                <button type="submit" class="btn btn-success px-5">
                    ✅ Submit Walk-In
                </button>
                <a href="{{ url_for('auth.dashboard') }}" class="btn btn-secondary ms-2">
                    ⬅ Back
                </a>
            </div>

        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
